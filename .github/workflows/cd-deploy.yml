name: CD — Deploy to EKS

on:
  workflow_run:
    workflows:
      - "CI — Backend"
      - "CI — Frontend"
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.17.3'

      - name: Deploy with Helm
        run: |
          helm upgrade rashmedix ./k8s/helm/rashmedix \
            --namespace rashmedix \
            --create-namespace \
            --timeout 5m \
            --atomic \
            --set backend.image.tag=v1 \
            --set frontend.image.tag=v1 \
            --set backend.image.repository=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/rashmedix/backend \
            --set frontend.image.repository=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/rashmedix/frontend

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/backend \
            -n rashmedix --timeout=3m
          kubectl rollout status deployment/frontend \
            -n rashmedix --timeout=3m

      - name: Print deployment summary
        run: |
          echo "===== Deployment Summary ====="
          kubectl get pods -n rashmedix
          kubectl get ingress -n rashmedix
          echo "=============================="
