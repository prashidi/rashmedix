services:

  db:
    image: postgres:15-alpine
    container_name: rashmedix-db
    environment:
      POSTGRES_DB: rashmedix
      POSTGRES_USER: rashmedix_user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rashmedix_user -d rashmedix"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rashmedix-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rashmedix-backend
    environment:
      SECRET_KEY: local-docker-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DB_NAME: rashmedix
      DB_USER: rashmedix_user
      DB_PASSWORD: password
      DB_HOST: db
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "python manage.py migrate && gunicorn rashmedix_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3"]
    networks:
      - rashmedix-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rashmedix-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - rashmedix-net

volumes:
  postgres_data:

networks:
  rashmedix-net:
    driver: bridge
