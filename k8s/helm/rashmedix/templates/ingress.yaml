apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rashmedix-ingress
  namespace: {{ .Values.global.namespace }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    {{- /* Named ALB — prevents new ALB being created on redeploy */}}
    alb.ingress.kubernetes.io/load-balancer-name: rashmedix-alb
spec:
  ingressClassName: alb
  rules:
    {{- /* No host field — accepts ALB hostname, subdomain, and any future domain */}}
    - http:
        paths:
          {{- /* /api goes to Django backend service */}}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.backend.name }}-service
                port:
                  number: 8000
          {{- /* / catch-all goes to React frontend — must be last */}}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.frontend.name }}-service
                port:
                  number: 80
