# ── Blue deployment — version 1 (currently live) ──────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-blue
  namespace: rashmedix
  labels:
    app: backend
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      version: blue
  template:
    metadata:
      labels:
        app: backend
        version: blue
    spec:
      containers:
        - name: backend
          # Blue runs current stable image v1
          image: 437932913013.dkr.ecr.eu-west-1.amazonaws.com/rashmedix/backend:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: rashmedix-secrets
          env:
            - name: DEBUG
              value: "False"
            # Identify which version is serving — useful in logs
            - name: APP_VERSION
              value: "blue-v1"
          command:
            - sh
            - -c
            - |
              python manage.py migrate --noinput && \
              gunicorn rashmedix_backend.wsgi:application \
              --bind 0.0.0.0:8000 \
              --workers 3 \
              --timeout 120
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/')"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/')"
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# ── Blue service — points to blue pods only ───────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: rashmedix
  labels:
    app: backend
spec:
  selector:
    app: backend
    # This selector determines which colour is live
    # Change to "green" to switch traffic
    version: blue
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
